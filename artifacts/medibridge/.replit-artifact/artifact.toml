kind = "web"
previewPath = "/"
title = "MediBridge Global"
version = "1.0.0"
id = "artifacts/medibridge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21089

[services.development]
run = "pnpm --filter @workspace/medibridge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medibridge", "run", "build" ]
publicDir = "artifacts/medibridge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21089"
BASE_PATH = "/"
